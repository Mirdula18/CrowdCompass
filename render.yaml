services:
  # Backend — Express API that proxies to Gemini. GEMINI_API_KEY must be set
  # manually in the Render dashboard (Environment tab) as a secret; it is not
  # committed here. FRONTEND_URL below is the real assigned URL of the
  # "stadiumpilot" static site (its plain name was taken, so Render suffixed
  # it) — keep this in sync with reality, since a Blueprint re-sync will
  # silently overwrite any dashboard-only edit back to whatever's in this file.
  - name: stadiumpilot-api
    type: web
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://stadiumpilot-vzqn.onrender.com

  # Frontend — static React build. VITE_API_BASE_URL points at the backend
  # service's actual assigned URL above.
  - name: stadiumpilot
    type: web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://stadiumpilot-api.onrender.com/api
