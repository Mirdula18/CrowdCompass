name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies (lint tooling)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install server dependencies
        run: npm ci --prefix server

      # Unit + HTTP integration tests — dependency-free (node --test) and no
      # API key required, so they run fully in CI.
      - name: Run server tests
        run: npm test --prefix server

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Build client
        run: npm run build --prefix client
